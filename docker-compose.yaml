services:
  bot:
    build: .
    container_name: osudcbot
    restart: unless-stopped
    volumes:
      - beatmaps:/usr/src/app/beatmaps
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CLIENT_ID=${CLIENT_ID}
      - OSU_CLIENT_ID=${OSU_CLIENT_ID}
      - OSU_CLIENT_SECRET=${OSU_CLIENT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-osulv}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: osudcbot-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-osulv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-osulv}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  beatmaps:
  postgres_data:
